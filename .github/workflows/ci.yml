name: CI

# Nothing gated the deploy before this: `pnpm run deploy:pages` force-pushes to gh-pages,
# so a broken build could ship without a single test having run.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The Prisma store is the one that runs in production, so CI must exercise it rather
    # than only the in-memory fallback.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: probook
          POSTGRES_PASSWORD: probook
          POSTGRES_DB: probook_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://probook:probook@localhost:5432/probook_test?schema=public
      # Explicit, not inherited from a developer's .env — a stale CORS_ORIGINS silently
      # blocks every browser call in the e2e suite and the failure looks like a code bug.
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      AUTH_DEV_MODE: "true"
      JWT_SECRET: ci-only-not-a-real-secret-${{ github.run_id }}
      NODE_ENV: test
      TZ: UTC

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        # `migrate deploy`, not `migrate dev`: it fails on a broken migration instead of
        # rewriting history, which is what we want CI to tell us about.
        run: pnpm --filter @probook/db exec prisma migrate deploy

      - run: pnpm build

      - run: pnpm -r typecheck

      - name: Unit tests (domain)
        run: pnpm --filter @probook/domain test

      - name: BDD acceptance suite
        run: pnpm test:bdd

      - name: Install Playwright browser
        run: pnpm e2e:install

      - name: End-to-end (against Postgres)
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
